<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POSTER MISSION 1000</title>
    <!-- 使用最穩定的 CDN -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --primary: #00f2fe; --accent: #ff4757; --gold: #f9d423; --bg: #0b0e14; }
        body { font-family: sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; text-align: center; -webkit-font-smoothing: antialiased; }
        
        /* 啟動遮罩 (解鎖音效用) */
        #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { background: var(--primary); color: #000; border: none; padding: 20px 40px; border-radius: 50px; font-weight: bold; font-size: 1.5rem; cursor: pointer; }

        .mission-card { background: #161b22; border: 1px solid #333; padding: 20px; border-radius: 20px; width: 85vw; max-width: 350px; margin: 20px auto; position: relative; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #000; transition: transform 5s cubic-bezier(0.15, 0, 0.2, 1); }
        .day-tag { position: absolute; top: 15px; right: 15px; background: var(--gold); color: #000; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        
        #spinBtn { background: #fff; color: #000; border: none; width: 80%; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.2rem; margin: 15px 0; }
        #topicDisplay { text-align: left; border-left: 4px solid var(--primary); padding-left: 15px; margin-top: 15px; min-height: 100px; }
        
        /* 截圖顯示區 */
        #previewContainer { margin-top: 30px; display: none; padding: 20px; }
        #previewContainer img { width: 100%; border: 2px solid var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

<!-- 第一步：點擊解鎖音效 -->
<div id="startOverlay">
    <h1 style="color:var(--gold)">POSTER 1000</h1>
    <p>準備好開始挑戰了嗎？</p>
    <button class="start-btn" onclick="initGame()">啟動挑戰</button>
</div>

<div class="mission-card" id="captureArea">
    <div class="day-tag" id="dayDisplay">DAY 01</div>
    <div style="width:100%; aspect-ratio:1; position:relative; margin-bottom:15px;">
        <div style="position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-top:20px solid var(--accent); z-index:10;"></div>
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
    </div>
    <button id="spinBtn" onclick="spin()">開始抽題</button>
    <div id="topicDisplay">
        <div style="font-size:0.7rem; color:var(--gold)">MISSION</div>
        <div id="resTitle" style="font-size:1.3rem; font-weight:bold; margin:5px 0">等待轉盤...</div>
        <div id="resSub" style="font-size:0.9rem; color:#888;"></div>
    </div>
    <div id="signLabel" style="font-size:0.6rem; color:#444; text-align:right; margin-top:10px;">@your_id</div>
</div>

<button style="background:none; border:1px solid #444; color:#888; padding:10px; border-radius:5px;" onclick="genImg()">📸 生成截圖 (長按儲存)</button>

<div id="previewContainer">
    <p style="color:var(--primary)">✨ 任務卡已生成！請長按圖片儲存 ✨</p>
    <img id="finalImg" src="">
</div>

<script>
let audioCtx, topics = [], isSpinning = false;
const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d');

function initGame() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('startOverlay').style.display = 'none';
    const savedId = prompt("請輸入您的 IG 帳號：", "@designer_name");
    if(savedId) document.getElementById('signLabel').innerText = savedId;
    loadTopics();
}

function playSnd(freq, dur) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function loadTopics() {
    topics = JSON.parse(localStorage.getItem('poster_final')) || ["注音視覺化","老牌店標","宮廟美學","變電箱山水","酸性設計","極簡主義","賽博龐克","瑞士風格","包浩斯","復古拼貼"];
    draw();
}

function draw() {
    let n = topics.length; let arc = Math.PI*2/n;
    ctx.clearRect(0,0,600,600);
    for(let i=0; i<n; i++) {
        ctx.fillStyle = `hsl(${(i*40)%360}, 50%, 40%)`;
        ctx.beginPath(); ctx.moveTo(300,300); ctx.arc(300,300,280,i*arc,(i+1)*arc); ctx.fill();
    }
}

function spin() {
    if(isSpinning) return; isSpinning = true;
    let idx = Math.floor(Math.random()*topics.length);
    canvas.style.transform = `rotate(${3600 + (360 - (idx*(360/topics.length)))}deg)`;
    
    let t = 0; const int = setInterval(() => { if(t++ < 20) playSnd(800, 0.05); else clearInterval(int); }, 150);

    setTimeout(() => {
        document.getElementById('resTitle').innerText = topics[idx];
        document.getElementById('resSub').innerText = "核心主題：孤獨的城市";
        playSnd(500, 0.5);
        isSpinning = false;
    }, 5000);
}

function genImg() {
    html2canvas(document.getElementById('captureArea'), {backgroundColor:'#0b0e14', scale:2}).then(cv => {
        document.getElementById('finalImg').src = cv.toDataURL();
        document.getElementById('previewContainer').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    });
}
</script>
</body>
</html>
