<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海報挑戰 1000 DAYS</title>
    <style>
        :root { --primary: #ff4757; --gold: #ffa502; --bg: #0f0f1a; --card: #1a1a2e; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 模式切換 */
        .mode-selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; background: var(--card); border-bottom: 2px solid #222; }
        .mode-btn { background: #333; border: none; color: #888; padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 0.85rem; }
        .mode-btn.active { background: var(--gold); color: #000; font-weight: bold; box-shadow: 0 0 10px rgba(255,165,2,0.4); }

        h1 { margin: 20px 0 5px; font-size: 1.6rem; letter-spacing: 1px; }
        #stats { font-size: 0.8rem; color: #777; margin-bottom: 5px; }
        
        /* 轉盤外殼 */
        .wheel-box { position: relative; width: 85vw; max-width: 420px; aspect-ratio: 1; margin: 10px auto; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #222; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5)); transition: transform 5s cubic-bezier(0.15, 0, 0.2, 1); }
        
        /* 指針 */
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; 
            border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 35px solid var(--primary); z-index: 10; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }

        #spinBtn { background: linear-gradient(135deg, #ff4757, #ff6b81); border: none; padding: 16px 50px; color: white; font-size: 1.3rem; border-radius: 50px; 
            cursor: pointer; margin-top: 20px; font-weight: bold; box-shadow: 0 5px 20px rgba(255,71,87,0.4); -webkit-tap-highlight-color: transparent; }
        #spinBtn:disabled { background: #444; box-shadow: none; opacity: 0.5; }
        
        /* 結果顯示 */
        #result { margin-top: 25px; padding: 0 20px; min-height: 100px; }
        .result-label { font-size: 0.9rem; color: #666; margin-bottom: 8px; }
        #topicDisplay { font-size: 2.2rem; font-weight: 900; color: #2ed573; text-shadow: 0 0 15px rgba(46,213,115,0.3); }

        /* 重置按鈕 */
        .reset-link { margin-top: 30px; display: inline-block; font-size: 0.7rem; color: #444; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="mode-selector">
    <button class="mode-btn" onclick="changeMode(7)">7天</button>
    <button class="mode-btn" onclick="changeMode(30)">30天</button>
    <button class="mode-btn active" onclick="changeMode(100)">100天</button>
    <button class="mode-btn" onclick="changeMode(365)">365天</button>
    <button class="mode-btn" onclick="changeMode(1000)">1000天</button>
</div>

<h1>海報挑戰 <span id="modeName">100</span> DAYS</h1>
<div id="stats">剩餘：<span id="count">0</span> / <span id="total">0</span></div>

<div class="wheel-box">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" width="800" height="800"></canvas>
</div>

<button id="spinBtn" onclick="spin()">點擊轉盤</button>

<div id="result">
    <div class="result-label">今日挑戰題目</div>
    <div id="topicDisplay">？</div>
</div>

<div class="reset-link" onclick="resetCurrentMode()">重置當前模式進度</div>

<script>
// 核心靈感庫
const matrix = {
    styles: ["極簡","酸性","賽博","瑞士","包浩斯","拼貼","波普","蒸汽波","新醜風","幾何","故障","日系","歐普","野獸派","超現實","粗獷","孟菲斯","新古典","浮世繪","街頭","擬物","扁平","達達","哥德","重金屬","粉彩","像素","水墨","電影質感","老雜誌","霓虹","報紙","未來","動漫","暗黑","剪影"],
    elements: ["時光","深海","宇宙","森林","大腦","心跳","數據","齒輪","花卉","昆蟲","建築","迷宮","黑洞","流體","冰晶","煙霧","金屬","陶瓷","絲綢","沙漏"],
    actions: ["轉譯","重構","碰撞","溶解","漂浮","碎裂","疊加","對話","隱藏","曝光"]
};

let currentMode = 100, topics = [], currentRotation = 0, isSpinning = false;
const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d');

// 生成題目算法
function generateTopics(n) {
    let res = [];
    while(res.length < n) {
        let s = matrix.styles[Math.floor(Math.random()*matrix.styles.length)];
        let e = matrix.elements[Math.floor(Math.random()*matrix.elements.length)];
        let a = matrix.actions[Math.floor(Math.random()*matrix.actions.length)];
        let combo = n <= 30 ? s : `${s}風：${e}的${a}`;
        if(!res.includes(combo)) res.push(combo);
    }
    return res.sort(() => Math.random() - 0.5);
}

function changeMode(days) {
    if(isSpinning) return;
    currentMode = days;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', parseInt(b.innerText) === days));
    
    let saved = localStorage.getItem(`poster_v2_mode_${days}`);
    topics = saved ? JSON.parse(saved) : generateTopics(days);
    
    document.getElementById('modeName').innerText = days;
    document.getElementById('total').innerText = days;
    document.getElementById('topicDisplay').innerText = "？";
    saveProgress();
    drawWheel();
}

function saveProgress() {
    localStorage.setItem(`poster_v2_mode_${currentMode}`, JSON.stringify(topics));
}

function drawWheel() {
    let n = topics.length; if(n === 0) return;
    let arc = Math.PI*2/n; ctx.clearRect(0,0,800,800);
    for(let i=0; i<n; i++) {
        ctx.fillStyle = `hsl(${(i*(360/Math.min(n,60)))%360}, 65%, 50%)`;
        ctx.beginPath(); ctx.moveTo(400,400); ctx.arc(400,400,380,i*arc,(i+1)*arc); ctx.fill();
    }
    ctx.beginPath(); ctx.arc(400,400,50,0,Math.PI*2); ctx.fillStyle="#0f0f1a"; ctx.fill();
    document.getElementById('count').innerText = n;
}

function spin() {
    if(isSpinning || topics.length === 0) return;
    isSpinning = true; document.getElementById('spinBtn').disabled = true;
    
    let prizeIndex = Math.floor(Math.random()*topics.length);
    let arcDeg = 360/topics.length;
    let rot = currentRotation + (360*10) + (360 - (prizeIndex*arcDeg) - (arcDeg/2));
    
    canvas.style.transform = `rotate(${rot}deg)`;
    currentRotation = rot;

    setTimeout(() => {
        document.getElementById('topicDisplay').innerText = topics[prizeIndex];
        topics.splice(prizeIndex, 1);
        saveProgress();
        isSpinning = false;
        document.getElementById('spinBtn').disabled = false;
        setTimeout(drawWheel, 1000);
    }, 5000);
}

function resetCurrentMode() {
    if(confirm(`確定要重置 ${currentMode} 天模式的所有進度嗎？`)) {
        localStorage.removeItem(`poster_v2_mode_${currentMode}`);
        changeMode(currentMode);
    }
}

// 啟動
changeMode(100);
</script>
</body>

</html>
